name: Refresh Events

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-events:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Scrape Cameri events
        run: node scripts/scrape-all-cameri-events.mjs --json prisma/data/events.json
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Scrape Lessin events
        run: node scripts/scrape-all-lessin-events.mjs --json prisma/data/events-lessin.json
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Scrape Hebrew Theatre events
        run: node scripts/scrape-all-hebrew-theatre-events.mjs --json prisma/data/events-hebrew-theatre.json
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Scrape Khan Theatre events
        run: node scripts/scrape-all-khan-events.mjs --json prisma/data/events-khan.json
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Scrape Gesher Theatre events
        run: node scripts/scrape-all-gesher-events.mjs --json prisma/data/events-gesher.json
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Scrape Haifa Theatre events
        run: node scripts/scrape-all-haifa-theatre-events.mjs --json prisma/data/events-haifa-theatre.json
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Scrape Tmuna Theatre events
        run: node scripts/scrape-all-tmuna-theatre-events.mjs --json prisma/data/events-tmuna-theatre.json
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Commit updated events
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prisma/data/events.json prisma/data/events-lessin.json prisma/data/events-hebrew-theatre.json prisma/data/events-khan.json prisma/data/events-gesher.json prisma/data/events-haifa-theatre.json prisma/data/events-tmuna-theatre.json
          if git diff --staged --quiet; then
            echo "No changes to events"
          else
            git commit -m "chore: refresh Cameri + Lessin + Hebrew Theatre + Khan + Gesher + Haifa Theatre + Tmuna Theatre events [$(date -u +%Y-%m-%d)]"
            git push
          fi
