name: Refresh Events

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-events:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Scrape all theatre events
        run: node scripts/scrape-all-events.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Commit updated events
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prisma/data/events*.json
          if git diff --staged --quiet; then
            echo "No changes to events"
          else
            git commit -m "chore: refresh Cameri + Lessin + Hebrew Theatre + Khan + Gesher + Haifa Theatre + Tmuna Theatre + Beer Sheva Theatre + Tzavta Theatre + Habima Theatre + Ashdod Venue + Rishon LeZion Venue + Or Akiva Venue + Theatron HaZafon Venue events [$(date -u +%Y-%m-%d)]"
            git push
          fi

      - name: Send events report email
        if: always()
        continue-on-error: true
        run: node scripts/send-events-report.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
