name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Unit & component tests
        run: npm test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Setup E2E environment
        run: npm run e2e:setup

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: "true"
          DATABASE_URL: "postgresql://test:test@localhost:5433/theatre_test"
          NEXTAUTH_URL: "http://localhost:3000"
          NEXTAUTH_SECRET: "e2e-test-secret-do-not-use-in-production"
          AUTH_SECRET: "e2e-test-secret-do-not-use-in-production"
          RESEND_API_KEY: "re_test_fake_key"
          BASE_URL: "http://localhost:3000"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Teardown E2E environment
        if: always()
        run: npm run e2e:teardown
